name: Deploy Microservice to Azure Container Apps

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: royalarenaregistry.azurecr.io
        username: ${{ secrets.AZURE_ACR_USERNAME }}
        password: ${{ secrets.AZURE_ACR_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t royalarenaregistry.azurecr.io/cards-microservice:${{ github.sha }} .
        docker push royalarenaregistry.azurecr.io/cards-microservice:${{ github.sha }}

    - name: Log in to Azure CLI
      uses: azure/login@v1
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"ffa9cc32-cf38-4db5-ab83-f999f8ecefdb","tenantId":"bc602b9e-63ca-49d2-9721-6f028cf50854"}'
      continue-on-error: true 

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        acrName: royalarenaregistry
        acrUsername: ${{ secrets.AZURE_ACR_USERNAME }}
        acrPassword: ${{ secrets.AZURE_ACR_PASSWORD }}
        containerAppName: cards-app
        resourceGroup: RoyalArenaRG
        imageToDeploy: royalarenaregistry.azurecr.io/cards-microservice:${{ github.sha }}
        containerAppEnvironment: RoyalArenaEnv
        targetPort: 8080
        environmentVariables: |
          SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}